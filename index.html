<meta charset="utf-8">

<title>Springfield Call List</title>
<style>
  :root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--sep:rgba(0,0,0,.10);--blue:#007aff;--green:#34c759;--orange:#ff9500;--teal:#30b0c7;--purple:#af52de;--red:#ff3b30;--yellow:#e8a800;--fill:#ececf0;--hover:#f4f4f6;--shadow:0 1px 2px rgba(0,0,0,.05)}
  @media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#9b9ba1;--sep:rgba(255,255,255,.12);--fill:#1c1c1e;--hover:#2c2c2e;--shadow:none}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto}
  header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:14px 18px 11px;border-bottom:.5px solid var(--sep)}
  h1{margin:0;font-size:23px;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px;line-height:1.4}
  .score{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px;font-size:12.5px}
  .score b{font-size:16px;font-weight:700;letter-spacing:-.01em;display:block}
  .score .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .score .pip{min-width:54px}
  .progress{height:7px;background:var(--fill);border-radius:99px;overflow:hidden;margin:10px 0 4px}
  .progress > i{display:block;height:100%;width:0;background:var(--green);border-radius:99px;transition:width .25s}
  .controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:9px}
  #q{flex:1;min-width:150px;background:var(--fill);border:none;color:var(--text);padding:9px 12px;border-radius:10px;font-size:16px;outline:none}
  select,.btn{background:var(--fill);border:none;color:var(--text);padding:9px 11px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500}
  .btn.on{background:var(--blue);color:#fff}
  .count{color:var(--muted);font-size:12px;margin-left:auto;white-space:nowrap}
  main{padding:6px 14px 100px}
  .sec{margin:16px 0 0}
  .lab{font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:0 6px 7px;display:flex;justify-content:space-between}
  .card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border:.5px solid var(--sep)}
  .row{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;position:relative}
  .row::after{content:"";position:absolute;left:48px;right:0;bottom:0;height:.5px;background:var(--sep)}
  .row:last-child::after{display:none}
  .row:hover{background:var(--hover)}
  .row.done{opacity:.5}
  .row.done .nm{text-decoration:line-through}
  .cb{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;background:transparent}
  .cb b{opacity:0}
  .row.done .cb{background:var(--green);border-color:var(--green)}
  .row.done .cb b{opacity:1}
  .mid{flex:1 1 auto;min-width:0}
  .nm{font-size:15.5px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta{font-size:12.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:1px 8px;border-radius:99px;margin-left:6px;color:#fff;vertical-align:middle}
  .tier{display:inline-block;font-size:11px;font-weight:600;padding:0 6px;border-radius:99px;margin-left:6px;background:var(--fill);color:var(--muted)}
  .cp{flex:0 0 auto;background:var(--blue);color:#fff;border:none;padding:8px 13px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer}
  .cp.ok{background:var(--green)}
  .chev{flex:0 0 auto;color:var(--muted);font-size:13px;width:14px;text-align:center}
  /* detail */
  .detail{display:none;padding:4px 14px 15px 48px;background:var(--card);border-top:.5px solid var(--sep)}
  .row.open + .detail{display:block}
  .stat{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}
  .sbtn{border:none;border-radius:9px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;background:var(--fill);color:var(--text);flex:1 0 auto;min-width:88px;text-align:center}
  .sbtn.sel{color:#fff}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
  .dgrid .full{grid-column:1/-1}
  .fld label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em;display:block;margin:0 0 3px 2px}
  .fld input,.fld textarea{width:100%;background:var(--fill);border:none;color:var(--text);padding:9px 11px;border-radius:9px;font-size:15px;outline:none;font-family:inherit}
  .fld textarea{resize:vertical;min-height:46px}
  .cbk{border:1px solid var(--orange);border-radius:11px;padding:9px 11px;margin-top:9px;background:color-mix(in srgb,var(--orange) 9%,transparent)}
  .cbk .hd{font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.03em;margin-bottom:7px}
  .links{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
  .links a{font-size:13px;font-weight:600;color:var(--blue);text-decoration:none;background:var(--fill);padding:7px 12px;border-radius:9px}
  .lastc{font-size:11.5px;color:var(--muted);margin-top:9px}
  /* due banner */
  .due{margin:14px 0 0;border-radius:14px;overflow:hidden;border:1px solid var(--orange);background:color-mix(in srgb,var(--orange) 8%,transparent)}
  .due .dh{font-size:12.5px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.04em;padding:10px 14px 6px}
  .due .drow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:.5px solid var(--sep);font-size:14px;cursor:pointer}
  .due .drow .when{margin-left:auto;font-size:12px;font-weight:700;white-space:nowrap}
  .due .drow .when.now{color:var(--red)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(10px);background:rgba(30,30,32,.95);color:#fff;font-weight:600;font-size:14px;padding:11px 17px;border-radius:12px;opacity:0;transition:.2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%)}
  .saved{position:fixed;right:16px;bottom:24px;background:var(--green);color:#fff;font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:99px;opacity:0;transition:.18s;pointer-events:none;z-index:50}
  .saved.show{opacity:1}
  .saved.err{background:var(--red)}
  @media print{header{position:static;background:#fff;backdrop-filter:none}.controls,.progress,.cp,.toast,.saved,.chev,.links{display:none!important}body{background:#fff;color:#000}.card{box-shadow:none;border:1px solid #ccc}.row{break-inside:avoid}.meta{color:#444}}
</style>
</head>

    <button class="btn" id="exp">Export</button>
    <button class="btn" id="imp">Import</button>
    <input type="file" id="impf" accept="application/json" style="display:none">
    <button class="btn" id="print">Print</button>
    <span class="count" id="count"></span>
  </div>
</header>
<main id="app"></main>
</div>

LEADS.forEach(l=>{const m=TOWNMI[l.t]||[12,2];l.mi=m[0];l.tier=m[1];l.dig=l.p.replace(/\D/g,'');});

// ---- status defs ----
const STATUS={
  noanswer:{lbl:"No answer",c:"var(--muted)"},
  leftmsg:{lbl:"Left msg",c:"var(--blue)"},
  answered:{lbl:"Answered",c:"var(--teal)"},
  callback:{lbl:"Callback",c:"var(--orange)"},
  notnow:{lbl:"Not now",c:"var(--purple)"},
  won:{lbl:"WON",c:"var(--green)"},
  called:{lbl:"Called",c:"var(--muted)"}
};
const ORDER=["noanswer","leftmsg","answered","callback","notnow","won"];

// ---- storage (single keyed blob per church/week + visible save) ----
const LIST_ID="stpatrick-1900allen-springfield";
const SKEY="callstate_v2_"+LIST_ID;
let STATE={};
try{STATE=JSON.parse(localStorage.getItem(SKEY))||{};}catch(e){STATE={};}
// one-time migration of old spfd_ done flags so the 35 check-offs carry over
(function migrate(){let ch=false;LEADS.forEach(l=>{if(localStorage.getItem('spfd_'+l.dig)==='1'&&!STATE[l.dig]){STATE[l.dig]={status:'called',ts:Date.now(),notes:'',dm:'',time:'',email:''};ch=true;}});if(ch)save();})();
// ---- seed: calls already made on the old sheet (applied once per version; never overwrites anything you've already set here) ----
const SEED=[
{dig:"4132069763",status:"callback",notes:"Left number for the decision maker."},
{dig:"4135310995",status:"leftmsg"},

const SEEDVER=2;
const SEEDTS=(function(){const d=new Date();d.setHours(0,0,0,0);return d.getTime()-1;})();
(function applySeed(){let cur=parseInt(localStorage.getItem('seedver_'+LIST_ID)||'0',10);if(cur>=SEEDVER)return;let ch=false;SEED.forEach(s=>{const ex=STATE[s.dig];if(!ex||!ex.status){STATE[s.dig]={status:s.status,ts:(ex&&ex.ts)||SEEDTS,notes:s.notes||((ex&&ex.notes)||''),dm:(ex&&ex.dm)||'',time:(ex&&ex.time)||'',email:s.email||((ex&&ex.email)||'')};ch=true;}});try{localStorage.setItem('seedver_'+LIST_ID,String(SEEDVER));if(ch)localStorage.setItem(SKEY,JSON.stringify(STATE));}catch(e){}})();
(function fixSeedToday(){if(localStorage.getItem('seedtsfix_'+LIST_ID)==='1')return;let ch=false;const seedset={};SEED.forEach(s=>seedset[s.dig]=1);LEADS.forEach(l=>{const r=STATE[l.dig];if(r&&r.status&&seedset[l.dig]&&isToday(r.ts)){r.ts=SEEDTS;ch=true;}});try{localStorage.setItem('seedtsfix_'+LIST_ID,'1');if(ch)localStorage.setItem(SKEY,JSON.stringify(STATE));}catch(e){}})();
function rec(dig){return STATE[dig]||(STATE[dig]={status:'',ts:0,notes:'',dm:'',time:'',email:''});}
const EMPTY={status:'',ts:0,notes:'',dm:'',time:'',email:''};
function get(dig){return STATE[dig]||EMPTY;}
let saveT;
function save(){
  try{localStorage.setItem(SKEY,JSON.stringify(STATE));flagSaved(false);}
  catch(e){flagSaved(true);}
}
function flagSaved(err){const f=document.getElementById('savedflag');f.textContent=err?'⚠ NOT saved — Export now':'Saved ✓';f.classList.toggle('err',err);f.classList.add('show');clearTimeout(saveT);saveT=setTimeout(()=>f.classList.remove('show'),err?4000:850);}

// ---- helpers ----
function isDone(l){return !!(STATE[l.dig]&&STATE[l.dig].status);}
function isToday(ts){if(!ts)return false;const d=new Date(ts),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
function setStatus(l,st){const r=rec(l.dig);r.status=(r.status===st)?'':st;if(r.status)r.ts=Date.now();save();}
const GOAL=80;

const app=document.getElementById('app'),q=document.getElementById('q'),count=document.getElementById('count'),bar=document.getElementById('bar'),toast=document.getElementById('toast'),scoreEl=document.getElementById('score');
let hideDone=false,nearOnly=false,sortMode='cat',cbView=false;

function copyNum(p,btn){const ok=()=>{btn.textContent='Copied';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},900);showToast('Copied  '+p);};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(p).then(ok,()=>fb(p,ok));}else fb(p,ok);}
function fb(t,ok){const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.opacity='0';document.body.appendChild(a);a.select();try{document.execCommand('copy');ok();}catch(e){}document.body.removeChild(a);}
let tt;function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),1100);}
function srch(name,town){return 'https://www.google.com/search?q='+encodeURIComponent(name+' '+town+' MA');}
function maps(name,town){return 'https://www.google.com/maps/search/'+encodeURIComponent(name+' '+town+' MA');}

function detailEl(l){
  const r=get(l.dig);
  const d=document.createElement('div');d.className='detail';
  // status buttons
  const stat=document.createElement('div');stat.className='stat';
  ORDER.forEach(st=>{
    const b=document.createElement('button');b.className='sbtn'+(r.status===st?' sel':'');b.textContent=STATUS[st].lbl;
    if(r.status===st)b.style.background=STATUS[st].c;
    b.addEventListener('click',e=>{e.stopPropagation();setStatus(l,st);build();});
    stat.appendChild(b);
  });
  d.appendChild(stat);
  // notes
  const fn=document.createElement('div');fn.className='fld';fn.innerHTML='<label>Notes</label>';
  const ta=document.createElement('textarea');ta.value=r.notes||'';ta.placeholder='What happened on the call…';
  ta.addEventListener('click',e=>e.stopPropagation());
  ta.addEventListener('input',()=>{rec(l.dig).notes=ta.value;clearTimeout(ta._t);ta._t=setTimeout(save,400);});
  ta.addEventListener('blur',save);
  fn.appendChild(ta);d.appendChild(fn);
  // callback / decision-maker block
  const cbk=document.createElement('div');cbk.className='cbk';
  cbk.innerHTML='<div class="hd">↩ Callback / right person</div>';
  const g=document.createElement('div');g.className='dgrid';
  function field(lbl,val,key,type,full){
    const w=document.createElement('div');w.className='fld'+(full?' full':'');w.innerHTML='<label>'+lbl+'</label>';
    const i=document.createElement('input');i.type=type||'text';i.value=val||'';
    i.addEventListener('click',e=>e.stopPropagation());
    i.addEventListener('input',()=>{rec(l.dig)[key]=i.value;clearTimeout(i._t);i._t=setTimeout(save,300);});
    i.addEventListener('change',save);i.addEventListener('blur',save);
    w.appendChild(i);return w;
  }
  g.appendChild(field('Ask for (name / title)',r.dm,'dm','text',true));
  g.appendChild(field('Call back at',r.time,'time','datetime-local'));
  g.appendChild(field('Email',r.email,'email','text'));
  cbk.appendChild(g);d.appendChild(cbk);
  // links
  const lk=document.createElement('div');lk.className='links';
  lk.innerHTML='<a target="_blank" rel="noopener" href="'+srch(l.n,l.t)+'">🔎 Web</a><a target="_blank" rel="noopener" href="'+maps(l.n,l.t)+'">📍 Maps</a><a href="tel:1'+l.dig+'">📞 Dial</a>';
  lk.querySelectorAll('a').forEach(a=>a.addEventListener('click',e=>e.stopPropagation()));
  d.appendChild(lk);
  // last called
  if(r.ts){const lc=document.createElement('div');lc.className='lastc';lc.textContent='Last marked: '+new Date(r.ts).toLocaleString();d.appendChild(lc);}
  return d;
}

function rowEl(l,withCat){
  const r=get(l.dig),done=!!r.status;
  const row=document.createElement('div');row.className='row'+(done?' done':'');
  row.innerHTML='<span class="cb"><b>✓</b></span><div class="mid"><div class="nm"></div><div class="meta"></div></div><button class="cp">Copy</button><span class="chev">›</span>';
  row.querySelector('.nm').textContent=l.n+(withCat?'  ·  '+l.c:'');
  const meta=row.querySelector('.meta');
  meta.textContent=l.t+' · ~'+l.mi+' mi';
  const tier=document.createElement('span');tier.className='tier';tier.textContent=l.tier===1?'closest':'edge';meta.appendChild(tier);
  if(done){const pl=document.createElement('span');pl.className='pill';pl.textContent=STATUS[r.status].lbl;pl.style.background=STATUS[r.status].c;meta.appendChild(pl);}
  if(r.time){const pl=document.createElement('span');pl.className='pill';pl.textContent='↩ '+shortWhen(r.time);pl.style.background='var(--orange)';meta.appendChild(pl);}
  // quick check circle
  row.querySelector('.cb').addEventListener('click',e=>{e.stopPropagation();const rr=rec(l.dig);rr.status=rr.status?'':'called';if(rr.status)rr.ts=Date.now();save();build();});
  const cp=row.querySelector('.cp');cp.addEventListener('click',e=>{e.stopPropagation();copyNum(l.p,cp);const rr=rec(l.dig);if(!rr.ts)rr.ts=Date.now();save();});
  row.addEventListener('click',()=>{row.classList.toggle('open');});
  return row;
}

function shortWhen(t){if(!t)return'';const d=new Date(t);if(isNaN(d))return t;return d.toLocaleString([],{month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit'});}

function dueBanner(){
  const items=LEADS.filter(l=>get(l.dig).time).map(l=>({l,t:new Date(get(l.dig).time)})).filter(x=>!isNaN(x.t)).sort((a,b)=>a.t-b.t);
  if(!items.length)return null;
  const now=Date.now();
  const wrap=document.createElement('div');wrap.className='due';
  wrap.innerHTML='<div class="dh">↩ Callbacks ('+items.length+')</div>';
  items.forEach(({l,t})=>{
    const r=get(l.dig);const over=t.getTime()<=now;
    const dr=document.createElement('div');dr.className='drow';
    dr.innerHTML='<b>'+esc(l.n)+'</b>'+(r.dm?' <span style="color:var(--muted);font-weight:500">— '+esc(r.dm)+'</span>':'')+'<span class="when'+(over?' now':'')+'">'+(over?'DUE · ':'')+shortWhen(r.time)+'</span>';
    dr.addEventListener('click',()=>{copyNum(l.p,{textContent:'',classList:{add(){},remove(){}}});showToast('Copied  '+l.p);});
    wrap.appendChild(dr);
  });
  return wrap;
}
function esc(s){return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function updateScore(){
  let done=0,today=0,answered=0,won=0,cbs=0;
  LEADS.forEach(l=>{const r=STATE[l.dig];if(!r)return;if(r.status)done++;if(isToday(r.ts))today++;if(r.status==='answered')answered++;if(r.status==='won')won++;if(r.time)cbs++;});
  scoreEl.innerHTML=
    '<div class="pip"><b>'+today+' / '+GOAL+'</b><span class="lbl">calls today</span></div>'+
    '<div class="pip"><b>'+answered+'</b><span class="lbl">answered</span></div>'+
    '<div class="pip"><b>'+cbs+'</b><span class="lbl">callbacks</span></div>'+
    '<div class="pip"><b style="color:var(--green)">'+won+'</b><span class="lbl">won</span></div>';
  const pct=Math.round(done/LEADS.length*100);bar.style.width=pct+'%';count.textContent=done+' / '+LEADS.length+' done';
}

function build(){
  app.innerHTML='';const term=q.value.trim().toLowerCase();
  updateScore();
  if(cbView){
    const b=dueBanner();
    app.appendChild(b||Object.assign(document.createElement('div'),{style:'color:var(--muted);text-align:center;padding:40px',textContent:'No callbacks set yet. Set a "Call back at" time on a lead.'}));
    return;
  }
  const due=dueBanner();if(due)app.appendChild(due);
  const match=l=>{const r=STATE[l.dig];if(hideDone&&r&&r.status)return false;if(nearOnly&&l.tier!==1)return false;if(!term)return true;return (l.n+' '+l.c+' '+l.t).toLowerCase().includes(term);};
  if(sortMode==='dist'){
    const rows=LEADS.filter(match).slice().sort((a,b)=>a.mi-b.mi);
    if(!rows.length){app.appendChild(noMatch());return;}
    const card=document.createElement('div');card.className='card';
    rows.forEach(l=>{card.appendChild(rowEl(l,true));card.appendChild(detailEl(l));});
    const sec=document.createElement('div');sec.className='sec';sec.appendChild(card);app.appendChild(sec);
  } else {
    let any=false;
    CATS.forEach(cat=>{
      const rows=LEADS.filter(l=>l.c===cat).filter(match);
      if(!rows.length)return;any=true;
      const sec=document.createElement('div');sec.className='sec';
      sec.innerHTML='<div class="lab"><span>'+cat+'</span><span>'+rows.length+'</span></div>';
      const card=document.createElement('div');card.className='card';
      rows.forEach(l=>{card.appendChild(rowEl(l,false));card.appendChild(detailEl(l));});
      sec.appendChild(card);app.appendChild(sec);
    });
    if(!any)app.appendChild(noMatch());
  }
}
function noMatch(){return Object.assign(document.createElement('div'),{style:'color:var(--muted);text-align:center;padding:40px',textContent:'No matches'});}

// ---- export / import backup ----
function exportData(){
  const blob=new Blob([JSON.stringify({list:LIST_ID,exported:new Date().toISOString(),state:STATE},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='callstate-stpatrick-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('Backup downloaded');
}
function importData(file){
  const fr=new FileReader();fr.onload=()=>{try{const o=JSON.parse(fr.result);const st=o.state||o;if(typeof st!=='object')throw 0;
    let n=0;Object.keys(st).forEach(k=>{STATE[k]=Object.assign(rec(k),st[k]);n++;});
    save();build();showToast('Restored '+n+' leads');}catch(e){showToast('Bad backup file');}};
  fr.readAsText(file);
}

// ---- wire ----
q.addEventListener('input',build);
document.getElementById('sort').addEventListener('change',function(){sortMode=this.value;build();});
document.getElementById('near').addEventListener('click',function(){nearOnly=!nearOnly;this.classList.toggle('on',nearOnly);build();});
document.getElementById('hide').addEventListener('click',function(){hideDone=!hideDone;this.classList.toggle('on',hideDone);this.textContent=hideDone?'Show all':'Hide done';build();});
document.getElementById('cbview').addEventListener('click',function(){cbView=!cbView;this.classList.toggle('on',cbView);build();});
document.getElementById('exp').addEventListener('click',exportData);
document.getElementById('imp').addEventListener('click',()=>document.getElementById('impf').click());
document.getElementById('impf').addEventListener('change',function(){if(this.files[0])importData(this.files[0]);this.value='';});
document.getElementById('print').addEventListener('click',()=>window.print());
build();
