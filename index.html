<style>
  :root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--sep:rgba(0,0,0,.10);--blue:#007aff;--green:#34c759;--fill:#ececf0;--hover:#f4f4f6;--shadow:0 1px 2px rgba(0,0,0,.05)}
  @media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#9b9ba1;--sep:rgba(255,255,255,.12);--fill:#1c1c1e;--hover:#2c2c2e;--shadow:none}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto}
  header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:16px 18px 12px;border-bottom:.5px solid var(--sep)}
  h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:13px;margin-top:3px;line-height:1.4}
  .progress{height:7px;background:var(--fill);border-radius:99px;overflow:hidden;margin:12px 0 4px}
  .progress > i{display:block;height:100%;width:0;background:var(--green);border-radius:99px;transition:width .25s}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
  #q{flex:1;min-width:160px;background:var(--fill);border:none;color:var(--text);padding:9px 12px;border-radius:10px;font-size:16px;outline:none}
  select,.btn{background:var(--fill);border:none;color:var(--text);padding:9px 12px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500}
  .btn.on{background:var(--blue);color:#fff}
  .count{color:var(--muted);font-size:12px;margin-left:auto;white-space:nowrap}
  main{padding:8px 14px 90px}
  .sec{margin:18px 0 0}
  .lab{font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:0 6px 7px;display:flex;justify-content:space-between}
  .card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border:.5px solid var(--sep)}
  .row{display:flex;align-items:center;gap:13px;padding:11px 14px;cursor:pointer;position:relative}
  .row::after{content:"";position:absolute;left:50px;right:0;bottom:0;height:.5px;background:var(--sep)}
  .row:last-child::after{display:none}
  .row:hover{background:var(--hover)}
  .row.done{opacity:.45}
  .row.done .nm{text-decoration:line-through}
  .cb{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
  .row.done .cb{background:var(--green);border-color:var(--green)}
  .cb b{opacity:0}.row.done .cb b{opacity:1}
  .mid{flex:1 1 auto;min-width:0}
  .nm{font-size:16px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta{font-size:12.5px;color:var(--muted);margin-top:1px}
  .tier{display:inline-block;font-size:11px;font-weight:600;padding:0 6px;border-radius:99px;margin-left:6px;background:var(--fill);color:var(--muted)}
  .tel{flex:0 0 auto;color:var(--blue);font-weight:600;font-size:15px;text-decoration:none;font-variant-numeric:tabular-nums;white-space:nowrap}
  .cp{flex:0 0 auto;background:var(--blue);color:#fff;border:none;padding:8px 13px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer}
  .cp.ok{background:var(--green)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:rgba(30,30,32,.94);color:#fff;font-weight:600;font-size:14px;padding:11px 17px;border-radius:12px;opacity:0;transition:.2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%)}
  @media print{
    header{position:static;background:#fff;backdrop-filter:none}
    .controls,.progress,.tel,.cp,.toast{display:none!important}
    body{background:#fff;color:#000}.card{box-shadow:none;border:1px solid #ccc}
    .row{break-inside:avoid}.row::after{background:#ddd}
    .meta{color:#444}
  }
</style>
</head>

LEADS.forEach(l=>{const m=TOWNMI[l.t]||[12,2];l.mi=m[0];l.tier=m[1];});
const app=document.getElementById('app'),q=document.getElementById('q'),count=document.getElementById('count'),bar=document.getElementById('bar'),toast=document.getElementById('toast');
let hideDone=false,nearOnly=false,sortMode='cat';
const key=p=>'spfd_'+p.replace(/\D/g,'');
const isDone=p=>localStorage.getItem(key(p))==='1';
const setDone=(p,v)=>{v?localStorage.setItem(key(p),'1'):localStorage.removeItem(key(p));};
function rowEl(l){
  const r=document.createElement('div');r.className='row'+(isDone(l.p)?' done':'');
  r.innerHTML='<span class="cb"><b>✓</b></span><div class="mid"><div class="nm"></div><div class="meta"><span class="tn"></span> · ~<span class="mm"></span> mi<span class="tier"></span></div></div><a class="tel"></a><button class="cp">Copy</button>';
  r.querySelector('.nm').textContent=l.n;
  r.querySelector('.tn').textContent=l.t;
  r.querySelector('.mm').textContent=l.mi;
  r.querySelector('.tier').textContent=l.tier===1?'closest':'edge';
  const tel=r.querySelector('.tel');tel.textContent=l.p;tel.href='tel:1'+l.p.replace(/\D/g,'');
  tel.addEventListener('click',e=>e.stopPropagation());
  const cp=r.querySelector('.cp');
  cp.addEventListener('click',e=>{e.stopPropagation();copyNum(l.p,cp);});
  r.addEventListener('click',()=>{const v=!isDone(l.p);setDone(l.p,v);r.classList.toggle('done',v);updateBar();});
  return r;
}
function build(){
  app.innerHTML='';const term=q.value.trim().toLowerCase();
  const match=l=>{if(hideDone&&isDone(l.p))return false;if(nearOnly&&l.tier!==1)return false;if(!term)return true;return (l.n+' '+l.c+' '+l.t).toLowerCase().includes(term);};
  if(sortMode==='dist'){
    const rows=LEADS.filter(match).slice().sort((a,b)=>a.mi-b.mi);
    if(!rows.length){app.innerHTML='<div style="color:var(--muted);text-align:center;padding:40px">No matches</div>';updateBar();return;}
    const card=document.createElement('div');card.className='card';
    rows.forEach(l=>{const r=rowEl(l);r.querySelector('.nm').textContent=l.n+'  ·  '+l.c;card.appendChild(r);});
    const sec=document.createElement('div');sec.className='sec';sec.appendChild(card);app.appendChild(sec);
  } else {
    CATS.forEach(cat=>{
      const rows=LEADS.filter(l=>l.c===cat).filter(match);
      if(!rows.length)return;
      const sec=document.createElement('div');sec.className='sec';
      sec.innerHTML='<div class="lab"><span>'+cat+'</span><span>'+rows.length+'</span></div>';
      const card=document.createElement('div');card.className='card';
      rows.forEach(l=>card.appendChild(rowEl(l)));
      sec.appendChild(card);app.appendChild(sec);
    });
    if(!app.children.length)app.innerHTML='<div style="color:var(--muted);text-align:center;padding:40px">No matches</div>';
  }
  updateBar();
}
function updateBar(){let d=0;LEADS.forEach(l=>{if(isDone(l.p))d++;});const pct=Math.round(d/LEADS.length*100);bar.style.width=pct+'%';count.textContent=d+' / '+LEADS.length+' done';}
function copyNum(p,btn){const ok=()=>{btn.textContent='Copied';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},900);showToast('Copied  '+p);};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(p).then(ok,()=>fb(p,ok));}else fb(p,ok);}
function fb(t,ok){const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.opacity='0';document.body.appendChild(a);a.select();try{document.execCommand('copy');ok();}catch(e){}document.body.removeChild(a);}
let tt;function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),1100);}
q.addEventListener('input',build);
document.getElementById('sort').addEventListener('change',function(){sortMode=this.value;build();});
document.getElementById('near').addEventListener('click',function(){nearOnly=!nearOnly;this.classList.toggle('on',nearOnly);build();});
document.getElementById('hide').addEventListener('click',function(){hideDone=!hideDone;this.classList.toggle('on',hideDone);this.textContent=hideDone?'Show all':'Hide done';build();});
document.getElementById('print').addEventListener('click',()=>window.print());
document.getElementById('reset').addEventListener('click',function(){if(confirm('Clear all your check-offs?')){LEADS.forEach(l=>setDone(l.p,false));build();}});
build();
